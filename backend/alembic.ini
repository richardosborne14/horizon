# Alembic configuration file
# Run migrations: alembic upgrade head
# Create new migration: alembic revision --autogenerate -m "description"

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Database URL — overridden by env.py which reads from app settings
# Do not put actual credentials here (this file is committed to git)
# Host port 5436 maps to Docker container's 5432 (local pg uses 5432)
sqlalchemy.url = postgresql+psycopg://comcoi:comcoi_dev_password@localhost:5436/comcoi

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
