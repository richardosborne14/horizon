[pytest]
asyncio_mode = auto
# WHY session scope: asyncpg connections are tied to the event loop they were
# created on. A function-scoped loop (the default) causes "Future attached to
# a different loop" errors when the app's DB engine pool holds connections from
# a previous test. Session scope shares one loop for the whole test run.
# See backend/tests/conftest.py for the event_loop fixture.
asyncio_default_fixture_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
